<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Oracle Beam Video Call Demo</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d1321">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, Arial, sans-serif;
    background: #0d1321;
    color: #eee;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
  }
  .container { padding: 16px; text-align: center; }
  h2 { margin: 8px 0; color: #eaf2ff; }
  #myId {
    font-size: 1em;
    background: #16213a;
    padding: 10px;
    border-radius: 8px;
    word-break: break-all;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  #copyIdBtn, #changeIdBtn {
    background: #2d7ef7;
    border: none;
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 0.85em;
    flex-shrink: 0;
    margin: 0;
  }
  #changeIdBtn { background: #555; }
  input {
    padding: 10px;
    font-size: 1em;
    width: 70%;
    border-radius: 6px;
    border: none;
    margin-right: 6px;
  }
  button {
    padding: 10px 16px;
    font-size: 1em;
    border-radius: 6px;
    border: none;
    background: #2d7ef7;
    color: white;
    margin-top: 8px;
    margin-right: 6px;
  }
  #audioCallBtn { background: #2ecc71; }
  #status { margin-top: 10px; color: #9be89b; min-height: 20px; }

  .contactsList { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 12px; }
  .contactChip { background: #16213a; border: 1px solid #2d7ef7; padding: 8px 14px; border-radius: 20px; font-size: 0.9em; margin: 0; }
  .saveContactBar { display: none; align-items: center; gap: 6px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
  .saveContactBar input { width: 40%; }

  /* --- Call screen layout --- */
  #callScreen {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 20;
  }
  #remoteVideo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #111;
  }
  #localVideo {
    position: absolute;
    bottom: 90px;
    right: 16px;
    width: 110px;
    height: 150px;
    object-fit: cover;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.4);
    transform: scaleX(-1);
    background: #000;
  }
  #callInfo {
    position: absolute;
    top: 20px;
    left: 0;
    right: 0;
    text-align: center;
    color: #fff;
    font-size: 1.1em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  }
  #recIndicator {
    position: absolute;
    top: 20px;
    left: 20px;
    display: none;
    align-items: center;
    gap: 6px;
    color: #fff;
    font-size: 0.9em;
    background: rgba(0,0,0,0.4);
    padding: 4px 10px;
    border-radius: 20px;
  }
  #recDot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #e74c3c;
    animation: blink 1s infinite;
  }
  @keyframes blink { 50% { opacity: 0.2; } }
  #audioOnlyLabel {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  #audioOnlyLabel .avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: #2d7ef7;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2em;
    margin-bottom: 12px;
  }
  #callControls {
    position: absolute;
    bottom: 24px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 20px;
  }
  #callControls button {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    font-size: 1.3em;
    margin: 0;
  }
  #callHangupBtn { background: #e74c3c; }
  #recordBtn { background: #444; }
  #recordBtn.active { background: #e74c3c; }

  /* --- Incoming call screen --- */
  #incomingScreen {
    display: none;
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #16213a, #0d1321);
    z-index: 30;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-align: center;
  }
  #incomingScreen .avatar {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: #2d7ef7;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5em;
    margin-bottom: 20px;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(45,126,247,0.6); }
    70% { box-shadow: 0 0 0 24px rgba(45,126,247,0); }
    100% { box-shadow: 0 0 0 0 rgba(45,126,247,0); }
  }
  #incomingLabel { font-size: 1.2em; margin-bottom: 4px; }
  #incomingSubLabel { color: #9fb3d9; margin-bottom: 40px; }
  #incomingActions { display: flex; gap: 40px; }
  #incomingActions button {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    font-size: 1.5em;
    margin: 0;
  }
  #declineBtn { background: #e74c3c; }
  #acceptBtn { background: #2ecc71; }
</style>
</head>
<body>

<div class="container">
  <h2>Oracle Beam Video Call Demo</h2>

  <div>Your ID (share this with the other phone):</div>
  <div id="myId">
    <span id="myIdText">connecting...</span>
    <button id="copyIdBtn">Copy</button>
    <button id="changeIdBtn">Change</button>
  </div>

  <div>
    <input id="remoteId" placeholder="Enter other phone's ID" />
  </div>
  <div>
    <button id="videoCallBtn">Video Call</button>
    <button id="audioCallBtn">Audio Call</button>
  </div>

  <div id="status"></div>

  <div id="contactsList" class="contactsList"></div>

  <div id="saveContactBar" class="saveContactBar">
    <input id="saveContactName" placeholder="Save as..." />
    <button id="confirmSaveContact">Save</button>
    <button id="dismissSaveContact" style="background:#555;">Skip</button>
  </div>
</div>

<!-- Incoming call full-screen prompt -->
<div id="incomingScreen">
  <div class="avatar">📞</div>
  <div id="incomingLabel">Incoming call</div>
  <div id="incomingSubLabel">from Oracle Beam peer</div>
  <div id="incomingActions">
    <button id="declineBtn">✕</button>
    <button id="acceptBtn">✓</button>
  </div>
</div>

<!-- Active call screen -->
<div id="callScreen">
  <div id="callInfo">Connecting...</div>
  <div id="recIndicator"><span id="recDot"></span> REC</div>
  <video id="remoteVideo" autoplay playsinline></video>
  <video id="localVideo" autoplay playsinline muted></video>
  <div id="audioOnlyLabel">
    <div class="avatar">🎧</div>
    <div>Audio call</div>
  </div>
  <div id="callControls">
    <button id="recordBtn">⏺</button>
    <button id="callHangupBtn">✕</button>
  </div>
</div>

<!-- Hidden canvas used only for compositing the recording -->
<canvas id="recordCanvas" style="display:none;"></canvas>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
const statusEl = document.getElementById('status');
const myIdText = document.getElementById('myIdText');
const copyIdBtn = document.getElementById('copyIdBtn');
const changeIdBtn = document.getElementById('changeIdBtn');
const localVideo = document.getElementById('localVideo');
const remoteVideo = document.getElementById('remoteVideo');
const videoCallBtn = document.getElementById('videoCallBtn');
const audioCallBtn = document.getElementById('audioCallBtn');
const callScreen = document.getElementById('callScreen');
const callInfo = document.getElementById('callInfo');
const audioOnlyLabel = document.getElementById('audioOnlyLabel');
const callHangupBtn = document.getElementById('callHangupBtn');
const incomingScreen = document.getElementById('incomingScreen');
const incomingLabel = document.getElementById('incomingLabel');
const incomingSubLabel = document.getElementById('incomingSubLabel');
const acceptBtn = document.getElementById('acceptBtn');
const declineBtn = document.getElementById('declineBtn');
const recordBtn = document.getElementById('recordBtn');
const recIndicator = document.getElementById('recIndicator');
const recordCanvas = document.getElementById('recordCanvas');
const contactsList = document.getElementById('contactsList');
const saveContactBar = document.getElementById('saveContactBar');
const saveContactName = document.getElementById('saveContactName');

let fullStream = null;
let currentCall = null;
let pendingIncomingCall = null;
let audioCtx = null;
let ringInterval = null;
let currentIsAudioOnly = false;
let currentRemoteIdForSaving = null;

let mediaRecorder = null;
let recordedChunks = [];
let recordCanvasCtx = null;
let recordDrawLoopId = null;
let isRecording = false;

// --- Permanent 4-digit "phone number" style ID, stored on this device ---
function generateFourDigitId() {
  return String(Math.floor(1000 + Math.random() * 9000));
}
function getOrCreateMyPermanentId() {
  let id = localStorage.getItem('oracleBeamMyId');
  if (!id) {
    id = generateFourDigitId();
    localStorage.setItem('oracleBeamMyId', id);
  }
  return id;
}

// --- Contacts book, stored locally on this device only ---
function getContacts() {
  return JSON.parse(localStorage.getItem('oracleBeamContacts') || '{}');
}
function saveContact(id, name) {
  const contacts = getContacts();
  contacts[id] = name;
  localStorage.setItem('oracleBeamContacts', JSON.stringify(contacts));
  renderContacts();
}
function renderContacts() {
  const contacts = getContacts();
  contactsList.innerHTML = '';
  Object.entries(contacts).forEach(([id, name]) => {
    const btn = document.createElement('button');
    btn.className = 'contactChip';
    btn.textContent = name;
    btn.addEventListener('click', () => {
      document.getElementById('remoteId').value = id;
    });
    contactsList.appendChild(btn);
  });
}

let myPermanentId = getOrCreateMyPermanentId();
let peer;
function connectPeer() {
  peer = new Peer(myPermanentId, {
    host: location.hostname,
    port: location.port || 9000,
    path: '/',
    secure: true,
  });
  peer.on('open', (id) => { myIdText.textContent = id; });
  peer.on('error', (err) => {
    if (err.type === 'unavailable-id') {
      myPermanentId = generateFourDigitId();
      localStorage.setItem('oracleBeamMyId', myPermanentId);
      connectPeer();
      return;
    }
    statusEl.textContent = 'Error: ' + err.type;
    stopRingtone();
  });
  peer.on('call', (call) => {
    const isAudioOnly = call.metadata && call.metadata.audioOnly;
    pendingIncomingCall = { call, isAudioOnly };
    currentRemoteIdForSaving = call.peer;
    incomingLabel.textContent = isAudioOnly ? 'Incoming audio call' : 'Incoming video call';
    const contacts = getContacts();
    const callerName = contacts[call.peer] || `ID ${call.peer}`;
    incomingSubLabel.textContent = `from ${callerName}`;
    incomingScreen.style.display = 'flex';
    playRingtone();
  });
}
connectPeer();

changeIdBtn.addEventListener('click', () => {
  const wantsNumber = prompt('Enter a new 4-digit ID (leave blank for a random one):');
  let newId;
  if (wantsNumber === null) return;
  if (wantsNumber.trim() === '') {
    newId = generateFourDigitId();
  } else if (/^\d{4}$/.test(wantsNumber.trim())) {
    newId = wantsNumber.trim();
  } else {
    alert('Please enter exactly 4 digits, or leave it blank.');
    return;
  }
  if (peer) peer.destroy();
  myPermanentId = newId;
  localStorage.setItem('oracleBeamMyId', newId);
  myIdText.textContent = 'connecting...';
  connectPeer();
});

copyIdBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(myIdText.textContent).then(() => {
    copyIdBtn.textContent = 'Copied!';
    setTimeout(() => { copyIdBtn.textContent = 'Copy'; }, 1500);
  });
});

// --- FIX: force portrait capture so remote phones don't receive a
// sideways/landscape frame. Without explicit width/height, some
// Android/Chrome combos capture the raw landscape sensor frame and
// rely on rotation metadata that doesn't survive the WebRTC hop. ---
async function initMedia() {
  try {
    // Match capture shape to this phone'''s actual screen shape, so the
    // remote video fills the screen with object-fit:cover without
    // needing to crop/zoom much (avoids both the zoomed-face look and
    // the black-bar letterboxing).
    // Don'''t let the capture shape get narrower than a normal 9:16 video —
    // very tall/narrow screens would otherwise force a tight horizontal
    // crop that zooms in on the face. This still covers the screen fully,
    // just with a more natural field of view.
    const screenAspect = window.innerWidth / window.innerHeight;
    const captureAspect = Math.max(screenAspect, 9 / 16);
    fullStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'user',
        width: { ideal: 480 },
        aspectRatio: { ideal: captureAspect },
        frameRate: { ideal: 20, max: 24 }
      },
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: false,
        channelCount: 1
      },
    });
  } catch (err) {
    statusEl.textContent = 'Camera/mic access failed: ' + err.message;
  }
}
initMedia();
renderContacts();

function playRingtone() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  function ringOnce() {
    const now = audioCtx.currentTime;
    [440, 480].forEach((freq) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.15, now + 0.05);
      gain.gain.linearRampToValueAtTime(0, now + 0.4);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.4);
    });
  }
  ringOnce();
  ringInterval = setInterval(ringOnce, 1200);
}
function stopRingtone() {
  if (ringInterval) { clearInterval(ringInterval); ringInterval = null; }
}

function getOutgoingStream(isAudioOnly) {
  if (!isAudioOnly) return fullStream;
  const audioOnly = new MediaStream();
  fullStream.getAudioTracks().forEach(t => audioOnly.addTrack(t));
  return audioOnly;
}

acceptBtn.addEventListener('click', () => {
  if (!pendingIncomingCall) return;
  stopRingtone();
  incomingScreen.style.display = 'none';
  const { call, isAudioOnly } = pendingIncomingCall;
  const outgoing = getOutgoingStream(isAudioOnly);
  call.answer(outgoing);
  setupCall(call, isAudioOnly);
  pendingIncomingCall = null;
});

declineBtn.addEventListener('click', () => {
  if (!pendingIncomingCall) return;
  stopRingtone();
  incomingScreen.style.display = 'none';
  pendingIncomingCall.call.close();
  pendingIncomingCall = null;
});

function startCall(isAudioOnly) {
  const remoteId = document.getElementById('remoteId').value.trim();
  if (!remoteId) return;
  if (!fullStream) { statusEl.textContent = 'Waiting for camera/mic access...'; return; }
  currentRemoteIdForSaving = remoteId;
  const outgoing = getOutgoingStream(isAudioOnly);
  playRingtone();
  const call = peer.call(remoteId, outgoing, { metadata: { audioOnly: isAudioOnly } });
  setupCall(call, isAudioOnly);
}

videoCallBtn.addEventListener('click', () => startCall(false));
audioCallBtn.addEventListener('click', () => startCall(true));

function setupCall(call, isAudioOnly) {
  currentCall = call;
  currentIsAudioOnly = isAudioOnly;
  callScreen.style.display = 'block';
  callInfo.textContent = 'Connecting...';

  if (isAudioOnly) {
    localVideo.style.display = 'none';
    remoteVideo.style.display = 'none';
    audioOnlyLabel.style.display = 'flex';
  } else {
    localVideo.style.display = 'block';
    remoteVideo.style.display = 'block';
    audioOnlyLabel.style.display = 'none';
    localVideo.srcObject = fullStream;
  }

  call.on('stream', (remoteStream) => {
    stopRingtone();
    remoteVideo.srcObject = remoteStream;
    callInfo.textContent = isAudioOnly ? 'Audio call connected' : 'Video call connected';
  });

  call.on('close', endCall);
  call.on('error', (err) => {
    stopRingtone();
    callInfo.textContent = 'Call error: ' + err;
  });
}

function endCall() {
  if (isRecording) stopRecording();
  stopRingtone();
  if (currentCall) currentCall.close();
  currentCall = null;
  remoteVideo.srcObject = null;
  callScreen.style.display = 'none';
  statusEl.textContent = 'Call ended';

  if (currentRemoteIdForSaving && !getContacts()[currentRemoteIdForSaving]) {
    saveContactBar.style.display = 'flex';
    saveContactName.value = '';
  }
}

callHangupBtn.addEventListener('click', endCall);

document.getElementById('confirmSaveContact').addEventListener('click', () => {
  const name = saveContactName.value.trim();
  if (name && currentRemoteIdForSaving) {
    saveContact(currentRemoteIdForSaving, name);
  }
  saveContactBar.style.display = 'none';
});
document.getElementById('dismissSaveContact').addEventListener('click', () => {
  saveContactBar.style.display = 'none';
});

// ================= RECORDING =================

function startRecording() {
  if (!currentCall) return;
  recordedChunks = [];

  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const dest = audioCtx.createMediaStreamDestination();

  if (fullStream && fullStream.getAudioTracks().length) {
    const localSrc = audioCtx.createMediaStreamSource(new MediaStream(fullStream.getAudioTracks()));
    localSrc.connect(dest);
  }
  const remoteStreamObj = remoteVideo.srcObject;
  if (remoteStreamObj && remoteStreamObj.getAudioTracks().length) {
    const remoteSrc = audioCtx.createMediaStreamSource(new MediaStream(remoteStreamObj.getAudioTracks()));
    remoteSrc.connect(dest);
  }

  let recordStream;

  if (currentIsAudioOnly) {
    recordStream = dest.stream;
  } else {
    recordCanvas.width = 640;
    recordCanvas.height = 360;
    recordCanvasCtx = recordCanvas.getContext('2d');

    const RECORD_FPS = 15;
    function drawFrame() {
      recordCanvasCtx.fillStyle = '#000';
      recordCanvasCtx.fillRect(0, 0, recordCanvas.width, recordCanvas.height);
      if (remoteVideo.readyState >= 2) {
        recordCanvasCtx.drawImage(remoteVideo, 0, 0, recordCanvas.width, recordCanvas.height);
      }
      if (localVideo.readyState >= 2) {
        const pw = 100, ph = 135, px = recordCanvas.width - pw - 12, py = recordCanvas.height - ph - 12;
        recordCanvasCtx.save();
        recordCanvasCtx.translate(px + pw, py);
        recordCanvasCtx.scale(-1, 1);
        recordCanvasCtx.drawImage(localVideo, 0, 0, pw, ph);
        recordCanvasCtx.restore();
      }
      recordDrawLoopId = setTimeout(drawFrame, 1000 / RECORD_FPS);
    }
    drawFrame();

    const canvasStream = recordCanvas.captureStream(RECORD_FPS);
    recordStream = new MediaStream([
      ...canvasStream.getVideoTracks(),
      ...dest.stream.getAudioTracks(),
    ]);
  }

  const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')
    ? 'video/webm;codecs=vp8,opus'
    : 'video/webm';

  mediaRecorder = new MediaRecorder(recordStream, { mimeType, videoBitsPerSecond: 800000 });
  mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    if (recordDrawLoopId) clearTimeout(recordDrawLoopId);
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().replace(/[:.]/g, '-');
    a.href = url;
    a.download = `oracle-beam-call-${stamp}.webm`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  };

  mediaRecorder.start();
  isRecording = true;
  recordBtn.classList.add('active');
  recIndicator.style.display = 'flex';
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  isRecording = false;
  recordBtn.classList.remove('active');
  recIndicator.style.display = 'none';
}

recordBtn.addEventListener(
